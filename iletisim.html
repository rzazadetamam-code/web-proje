<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Kontrol Sayfası</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Web Projem</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Ana Sayfa</a>
                <a class="nav-link" href="hakkinda.html">Hakkında</a>
                <a class="nav-link active" href="iletisim.html">İletişim</a>
                <a class="nav-link" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div id="app" class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>İletişim Formu</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="iletisimFormu" name="iletisimFormu">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Adınız:</label>
                                    <input type="text" v-model="ad" id="ad" name="ad" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Soyadınız:</label>
                                    <input type="text" v-model="soyad" id="soyad" name="soyad" class="form-control">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">E-posta Adresiniz:</label>
                                <input type="email" v-model="email" id="email" name="email" class="form-control" placeholder="Örn: ad@domain.com">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Telefon Numaranız (Sadece Rakam):</label>
                                <input type="text" v-model="tel" id="tel" name="tel" class="form-control" maxlength="11" placeholder="05XXXXXXXXX">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">İletişim Konusu:</label>
                                <select v-model="konu" id="konu" name="konu" class="form-select">
                                    <option value="">Seçiniz...</option>
                                    <option value="Destek">Teknik Destek</option>
                                    <option value="Öneri">Öneri / İstek</option>
                                    <option value="İş">İş Birliği</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mesajınız:</label>
                                <textarea v-model="mesaj" id="mesaj" name="mesaj" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="row g-2">
                                <div class="col-md-6">
                                    <button type="button" onclick="jsKontrolEt()" class="btn btn-secondary w-100">JS ile Denetle</button>
                                </div>
                                <div class="col-md-6">
                                    <button type="button" @click="vueKontrolEt" class="btn btn-primary w-100">Vue.js ile Denetle</button>
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="reset" class="btn btn-outline-danger w-100">Temizle</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="kontrol.js"></script>
    <script>
        // VUE.JS KODU
        const { createApp } = Vue
        createApp({
            data() {
                return {
                    ad: '', soyad: '', email: '', tel: '', konu: '', mesaj: ''
                }
            },
            methods: {
                vueKontrolEt() {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    const telRegex = /^[0-9]+$/;

                    if (!this.ad || !this.soyad || !this.email || !this.tel || !this.konu || !this.mesaj) {
                        alert("Vue.js Mesajı: Lütfen tüm alanları veri girişi yaparak doldurunuz!");
                    } else if (!emailRegex.test(this.email)) {
                        alert("Vue.js Mesajı: E-posta formatı geçersiz!");
                    } else if (!telRegex.test(this.tel)) {
                        alert("Vue.js Mesajı: Telefon alanına sadece rakam girilmelidir!");
                    } else {
                        alert("Vue.js Mesajı: Form başarıyla doğrulandı!");
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
