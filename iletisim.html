<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Web Projesi</title>
    <!-- Bootstrap ile daha profesyonel görünmesini sağlıyoruz -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-dark text-white text-center py-4">
        <h1>İletişim Formu</h1>
    </header>

    <main class="container mt-5">
        <section class="row justify-content-center">
            <div class="col-md-6">
                <form id="contactForm">
                    <div class="mb-3">
                        <label for="ad" class="form-label">Adınız:</label>
                        <input type="text" class="form-control" id="ad" required>
                    </div>
                    <div class="mb-3">
                        <label for="soyad" class="form-label">Soyadınız:</label>
                        <input type="text" class="form-control" id="soyad" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-posta Adresiniz:</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="mesaj" class="form-label">Mesajınız:</label>
                        <textarea class="form-control" id="mesaj" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Gönder</button>
                    <button type="reset" class="btn btn-secondary">Temizle</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="text-center mt-5">
        <p><a href="index.html">Ana Sayfaya Dön</a></p>
    </footer>
</body>
</html>
