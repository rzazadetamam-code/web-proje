<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Web Projesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <div id="app" class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>İletişim Formu</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="contactForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Adınız:</label>
                                    <input type="text" id="ad" v-model="ad" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Soyadınız:</label>
                                    <input type="text" id="soyad" v-model="soyad" class="form-control">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">E-posta:</label>
                                <input type="email" id="email" v-model="email" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefon:</label>
                                <input type="text" id="tel" v-model="tel" class="form-control" maxlength="11">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Konu:</label>
                                <select id="konu" v-model="konu" class="form-select">
                                    <option value="">Seçiniz...</option>
                                    <option value="Destek">Destek</option>
                                    <option value="Öneri">Öneri</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mesaj:</label>
                                <textarea id="mesaj" v-model="mesaj" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="row g-2">
                                <div class="col-md-6">
                                    <button type="button" onclick="jsDenetleVeGonder()" class="btn btn-secondary w-100">JS ile Denetle & Gönder</button>
                                </div>
                                <div class="col-md-6">
                                    <button type="button" @click="vueDenetleVeGonder" class="btn btn-primary w-100">Vue.js ile Denetle & Gönder</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="kontrol.js"></script>

    <script>
        const { createApp } = Vue
        createApp({
            data() {
                return { ad: '', soyad: '', email: '', tel: '', konu: '', mesaj: '' }
            },
            methods: {
                vueDenetleVeGonder() {
                    if (!this.ad || !this.soyad || !this.email || !this.tel || !this.konu || !this.mesaj) {
                        alert("Vue.js: Lütfen tüm alanları doldurun!");
                    } else if (!this.email.includes('@')) {
                        alert("Vue.js: Geçersiz email!");
                    } else if (isNaN(this.tel)) {
                        alert("Vue.js: Telefon sadece rakam olmalı!");
                    } else {
                        alert("Vue.js: Başarılı! Gönderiliyor...");
                        window.location.href = `sonuc.html?ad=${this.ad}&soyad=${this.soyad}&email=${this.email}&tel=${this.tel}&konu=${this.konu}&mesaj=${this.mesaj}&yontem=VueJS`;
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
