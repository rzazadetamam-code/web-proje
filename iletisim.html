<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Web Projesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Web Projem</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Ana Sayfa</a>
                <a class="nav-link" href="hakkinda.html">Hakkında</a>
                <a class="nav-link active" href="iletisim.html">İletişim</a>
                <a class="nav-link" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div id="app" class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>İletişim Formu</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="iletisimFormu">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Adınız:</label>
                                    <input type="text" v-model="ad" id="ad" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Soyadınız:</label>
                                    <input type="text" v-model="soyad" id="soyad" class="form-control">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">E-posta:</label>
                                <input type="email" v-model="email" id="email" class="form-control" placeholder="ad@ornek.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefon (Sadece Rakam):</label>
                                <input type="text" v-model="tel" id="tel" class="form-control" maxlength="11">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Konu:</label>
                                <select v-model="konu" id="konu" class="form-select">
                                    <option value="">Seçiniz...</option>
                                    <option value="Destek">Destek</option>
                                    <option value="Öneri">Öneri</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mesaj:</label>
                                <textarea v-model="mesaj" id="mesaj" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="row g-2">
                                <div class="col-md-6">
                                    <button type="button" onclick="jsKontrolEt()" class="btn btn-secondary w-100">JS ile Denetle</button>
                                </div>
                                <div class="col-md-6">
                                    <button type="button" @click="vueKontrolEt" class="btn btn-primary w-100">Vue.js ile Denetle</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="kontrol.js"></script>
    <script>
        const { createApp } = Vue
        createApp({
            data() {
                return { ad: '', soyad: '', email: '', tel: '', konu: '', mesaj: '' }
            },
            methods: {
                vueKontrolEt() {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    const telRegex = /^[0-9]+$/;
                    if (!this.ad || !this.soyad || !this.email || !this.tel || !this.konu || !this.mesaj) {
                        alert("Vue.js: Lütfen tüm alanları doldurun!");
                    } else if (!emailRegex.test(this.email)) {
                        alert("Vue.js: Geçersiz e-posta!");
                    } else if (!telRegex.test(this.tel)) {
                        alert("Vue.js: Telefon sadece rakam olmalı!");
                    } else {
                        alert("Vue.js: Onaylandı! Bilgileriniz gönderiliyor...");
                        window.location.href = `sonuc.html?ad=${this.ad}&soyad=${this.soyad}&email=${this.email}&tel=${this.tel}&konu=${this.konu}&mesaj=${this.mesaj}&metot=Vue.js`;
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
