<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonuç</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container text-center">
        <div class="card shadow p-4">
            <h2 class="text-success">Form Verileri Alındı</h2>
            <hr>
            <div id="sonucData" class="text-start"></div>
            <a href="index.html" class="btn btn-primary mt-3">Ana Sayfa</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        let list = "<ul class='list-group'>";
        params.forEach((val, key) => {
            list += `<li class='list-group-item'><strong>${key.toUpperCase()}:</strong> ${val}</li>`;
        });
        list += "</ul>";
        document.getElementById("sonucData").innerHTML = list;
    </script>
</body>
</html>
