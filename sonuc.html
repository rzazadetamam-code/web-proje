<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonuç - Web Projesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-header bg-success text-white">
                <h3 class="text-center mb-0">Form Verileri Alındı</h3>
            </div>
            <div class="card-body">
                <div id="dataDisplay"></div>
            </div>
            <div class="card-footer text-center">
                <a href="index.html" class="btn btn-primary">Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let table = "<table class='table table-striped table-hover'>";
        params.forEach((val, key) => {
            table += `<tr><th class='text-capitalize'>${key}:</th><td>${val}</td></tr>`;
        });
        table += "</table>";
        document.getElementById("dataDisplay").innerHTML = table;
    </script>
</body>
</html>
