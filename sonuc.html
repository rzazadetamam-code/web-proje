<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Form Sonuçları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3>Gönderilen Form Bilgileri</h3>
            </div>
            <div class="card-body" id="sonucAlani">
                </div>
            <div class="card-footer text-center">
                <a href="index.html" class="btn btn-primary">Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let html = "<ul class='list-group'>";
        params.forEach((value, key) => {
            html += `<li class='list-group-item'><strong>${key.toUpperCase()}:</strong> ${value}</li>`;
        });
        html += "</ul>";
        document.getElementById('sonucAlani').innerHTML = html;
    </script>
</body>
</html>
