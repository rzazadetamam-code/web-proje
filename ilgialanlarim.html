<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlgi Alanlarım - Popüler Filmler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Poppins', sans-serif; }
        .api-header { 
            background: linear-gradient(45deg, #1a1a1a, #4b6cb7); 
            color: white; 
            padding: 60px 0; 
            border-radius: 0 0 50px 50px; 
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .movie-card { 
            border: none; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            transition: all 0.4s ease;
            height: 100%;
            background: white;
        }
        .movie-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        }
        .movie-img { height: 400px; object-fit: cover; }
        .rating-badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: rgba(255, 193, 7, 0.9); 
            color: #000; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <header class="api-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold"><i class="bi bi-camera-reels-fill me-2"></i>İlgi Alanlarım</h1>
            <p class="lead">Popüler Filmler - Canlı API Entegrasyonu (TMDB)</p>
        </div>
    </header>

    <div class="container mb-5">
        <div id="movie-container" class="row g-4">
            <div class="text-center w-100 py-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
                <p class="mt-3">Müthiş filmler getiriliyor...</p>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-outline-dark rounded-pill px-4">
                <i class="bi bi-house-door me-2"></i>Ana Sayfaya Dön
            </a>
        </div>
    </div>

    <script>
        const API_KEY = '46403428f2ac08730e0afb639a7db818';
        const MOVIE_URL = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=tr-TR&page=1`;
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        async function getMovies() {
            try {
                const res = await fetch(MOVIE_URL);
                const data = await res.json();
                showMovies(data.results);
            } catch (error) {
                document.getElementById('movie-container').innerHTML = `
                    <div class="alert alert-danger text-center">API bağlantısı başarısız oldu!</div>
                `;
            }
        }

        function showMovies(movies) {
            const container = document.getElementById('movie-container');
            container.innerHTML = '';

            movies.slice(0, 6).forEach(movie => {
                const movieEl = document.createElement('div');
                movieEl.classList.add('col-md-4', 'position-relative');
                movieEl.innerHTML = `
                    <div class="card movie-card">
                        <span class="rating-badge"><i class="bi bi-star-fill me-1"></i>${movie.vote_average.toFixed(1)}</span>
                        <img src="${IMG_PATH + movie.poster_path}" class="card-img-top movie-img" alt="${movie.title}">
                        <div class="card-body">
                            <h5 class="card-title fw-bold text-truncate">${movie.title}</h5>
                            <p class="card-text text-muted small">${movie.overview.substring(0, 120)}...</p>
                        </div>
                    </div>
                `;
                container.appendChild(movieEl);
            });
        }

        getMovies();
    </script>
</body>
</html>
