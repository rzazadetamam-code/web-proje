<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özgeçmiş (CV) - Tamam Rzazade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cv-header { background: linear-gradient(135deg, #0d6efd 0%, #00d4ff 100%); color: white; padding: 40px 0; border-radius: 0 0 50px 50px; margin-bottom: 30px; }
        .section-card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; margin-bottom: 20px; }
        .section-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .icon-box { width: 40px; height: 40px; background: #e7f1ff; color: #0d6efd; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .badge-skill { background: #e7f1ff; color: #0d6efd; border: none; padding: 8px 15px; border-radius: 20px; margin: 5px; font-weight: 500; display: inline-block; }
    </style>
</head>
<body>

    <header class="cv-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">Özgeçmiş (CV)</h1>
            <p class="lead">Eğitim ve Teknik Bilgilerim</p>
        </div>
    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card section-card p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-box"><i class="bi bi-mortarboard-fill fs-5"></i></div>
                        <h4 class="mb-0">Eğitim Bilgilerim</h4>
                    </div>
                    
                    <div class="ms-5 mt-3">
                        <h6 class="fw-bold text-primary mb-1">Üniversite</h6>
                        <p class="mb-0"><strong>Okul:</strong> Sakarya Üniversitesi</p>
                        <p class="text-muted"><strong>Bölüm:</strong> Bilgisayar Mühendisliği</p>
                        <hr class="w-25">
                        <h6 class="fw-bold text-primary mb-1">Lise</h6>
                        <p class="text-muted">246 numaralı lise okulu</p>
                    </div>
                </div>

                <div class="card section-card p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-box"><i class="bi bi-code-slash fs-5"></i></div>
                        <h4 class="mb-0">Teknik Beceriler</h4>
                    </div>
                    <div class="ms-5 mt-2">
                        <div class="badge-skill">HTML5</div>
                        <div class="badge-skill">CSS3</div>
                        <div class="badge-skill">JavaScript</div>
                        <div class="badge-skill">C#</div>
                        <div class="badge-skill">PHP</div>
                    </div>
                </div>

                <div class="text-center mt-5 mb-5">
                    <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4">
                        <i class="bi bi-arrow-left me-2"></i>Ana Sayfaya Geri Dön
                    </a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
