<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hoş Geldiniz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .welcome-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1 class="display-4 text-primary">Hoş Geldiniz!</h1>
        <p class="lead mt-3" id="welcome-msg">Sisteme başarıyla giriş yaptınız.</p>
        <hr>
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <p class="text-muted small">3 saniye içinde ana sayfaya yönlendiriliyorsunuz...</p>
        <a href="index.html" class="btn btn-outline-primary btn-sm mt-2">Hemen Git</a>
    </div>

    <script>
        // URL-dən nömrəni (no) götürürük
        const urlParams = new URLSearchParams(window.location.search);
        const ogrenciNo = urlParams.get('no');
        
        if (ogrenciNo) {
            document.getElementById('welcome-msg').innerText = "Hoş geldiniz, " + ogrenciNo + "!";
        }

        // 3 saniyə sonra avtomatik ana səhifəyə (index.html) yönləndirmə
        setTimeout(function() {
            window.location.href = "index.html";
        }, 3000);
    </script>
</body>
</html>
