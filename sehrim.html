<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrim - Sakarya</title>
    <!-- Slider için Bootstrap kullanacağız -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-primary text-white text-center py-3">
        <h1>Benim Şehrim: Sakarya</h1>
    </header>

    <main class="container mt-4">
        <section>
            <h2>Sakarya Hakkında</h2>
            <p><strong>Nüfus:</strong> Yaklaşık 1.080.000</p>
            <p><strong>Gezilecek Yerler:</strong> Sapanca Gölü, Taraklı, Acarlar Longozu, Justinianos Köprüsü.</p>
        </section>

        <!-- Slider Bölümü (En az 4 resim) -->
        <section class="mt-5">
            <h2>Şehrimden Kareler</h2>
            <div id="citySlider" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active"><img src="resim1.jpg" class="d-block w-100" alt="Gezilecek Yer 1"></div>
                    <div class="carousel-item"><img src="resim2.jpg" class="d-block w-100" alt="Gezilecek Yer 2"></div>
                    <div class="carousel-item"><img src="resim3.jpg" class="d-block w-100" alt="Gezilecek Yer 3"></div>
                    <div class="carousel-item"><img src="resim4.jpg" class="d-block w-100" alt="Gezilecek Yer 4"></div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#citySlider" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#citySlider" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </section>
    </main>

    <footer class="text-center mt-5 py-3">
        <p><a href="index.html">Ana Sayfaya Dön</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
