<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Web Projesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Kullanıcı Girişi</h4>
                    </div>
                    <div class="card-body">
                        <form onsubmit="return loginKontrol()">
    <div class="mb-3 text-start">
        <label class="form-label">Kullanıcı Adı (E-posta):</label>
        <input type="email" id="username" class="form-control" placeholder="g211210001@sakarya.edu.tr" required>
    </div>
    <div class="mb-3 text-start">
        <label class="form-label">Şifre (Öğrenci Numarası):</label>
        <input type="password" id="password" class="form-control" placeholder="g211210001" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
</form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none text-secondary">Ana Sayfaya Dön</a>
                </div>
            </div>
        </div>
    </div>

    <script src="kontrol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
